<!DOCTYPE html>
<html>

<head>
    <title>Chatbot AI</title>
</head>

<body>
    <div class="js-container"></div>

    <!-- Loads external library for react -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <!-- external library for babel -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- this attribute tells babel to translate all the code into normal JS. -->
    <script type="text/babel">
        function ChatInput() {
            return (
                <>
                    <input placeholder="Send a message to Chatbot AI" size="35" />
                    <button>Send</button>
                </>
            );
        }

        function ChatMessage(props) {
            const message = props.message;
            const sender = props.sender;

            if (sender === "robot") {
                return (
                    <div>
                        <img src="chatbot.png" width="50" />
                        {message}
                    </div>
                )
            }

            return (
                <div>
                    {message}
                    <img src="user.png" width="50" />
                </div>
            );
        }
        
        const app = (
            <>
                <ChatInput></ChatInput>
                <ChatMessage message="hello Chatbot" sender="user"></ChatMessage>
                <ChatMessage message="Hello! what can I do for you?" sender="robot" />

            </>
        );

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(app);
    </script>
</body>

</html>
